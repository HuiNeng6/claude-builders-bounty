name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get PR Diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: AI Review
        id: review
        run: |
          REVIEW=$(claude --print "Review this PR diff and output structured Markdown:

          $(cat pr.diff)

          Output format:
          ## Summary
          ## Identified Risks
          ## Improvement Suggestions
          ## Confidence Score")
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      
      - name: Post Review Comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "${{ steps.review.outputs.review }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}